<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>האתר של יונתן</title>
    <!-- שימוש ב-Tailwind CSS לעיצוב מהיר ויפה -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- הוספת פונט עברי יפה (Rubik) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap');
        body {
            font-family: 'Rubik', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100 min-h-screen flex items-center justify-center p-4">

    <!-- תיבת התוכן המרכזית -->
    <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 max-w-lg w-full text-center border-t-8 border-blue-500 transform transition duration-500 hover:scale-105">
        
        <!-- סמיילי נחמד למעלה -->
        <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
            <span class="text-5xl">👋</span>
        </div>

        <!-- כותרות -->
        <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-4">ברוכים הבאים!</h1>
        <p class="text-xl md:text-2xl text-gray-600 mb-6">
            הגעתם לאתר האישי של <span class="text-blue-600 font-bold">יונתן</span>.
        </p>
        
        <p class="text-gray-500 mb-8 leading-relaxed">
            איזה כיף שקפצתם לבקר! האתר הזה הוא הפינה הקטנה שלי באינטרנט. בקרוב אוסיף לכאן עוד דברים מעניינים.
        </p>

        <!-- כפתור אינטראקטיבי -->
        <button id="helloBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full transition duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-1">
            תגידו שלום!
        </button>

        <!-- הודעה מוסתרת שתוצג לאחר לחיצה על הכפתור -->
        <div id="welcomeMessage" class="hidden mt-6 p-4 bg-green-50 text-green-700 rounded-xl font-bold border border-green-200">
            שלום גם לכם! תודה רבה על הביקור 🚀
        </div>

    </div>

    <!-- סקריפט קצר להפעלת הכפתור -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('helloBtn');
            const message = document.getElementById('welcomeMessage');

            btn.addEventListener('click', () => {
                // הצגת ההודעה
                message.classList.remove('hidden');
                // הסתרת הכפתור כדי שלא ילחצו שוב ושוב
                btn.style.display = 'none';
            });
        });
    </script>

</body>
</html>
